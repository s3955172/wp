<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hikes Victoria - Add Hike</title>
    <!-- Link to Google Fonts -->
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Ysabeau+SC&family=Exo&display=swap">
    <!-- Link to Material Icons -->
    <link rel="stylesheet" href="https://fonts.googleapis.com/icon?family=Material+Icons">
    <!-- Link to common CSS file -->
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Header with navigation and search form -->
    <header>
        <nav>
            <!-- Logo linking to index.html -->
            <a href="index.html"><img src="logo.jpeg" alt="Hikes Victoria Logo"></a>
            <!-- Search form (optional functionality) -->
            <form>
                <!-- Search input -->
                <input type="text" placeholder="Search...">
                <!-- Search button (optional) -->
                <button type="submit">Search</button>
            </form>
            <!-- Dropdown menu for navigation -->
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="hikes.html">Hikes</a></li>
                <li><a href="add.html">Add more</a></li>
                <li><a href="gallery.html">Gallery</a></li>
            </ul>
        </nav>
    </header>
    <!-- Main section with add new hike form -->
    <main>
        <h1>Add New Hike</h1>
        <form>
            <!-- Hike name input -->
            <label for="hikeName">Hike Name:</label>
            <input type="text" id="hikeName" name="hikeName" required>
            
            <!-- Distance input -->
            <label for="distance">Distance (km):</label>
            <input type="number" id="distance" name="distance" required>
            
            <!-- Difficulty level input -->
            <label for="difficulty">Difficulty Level:</label>
            <select id="difficulty" name="difficulty" required>
                <option value="easy">Easy</option>
                <option value="medium">Medium</option>
                <option value="hard">Hard</option>
            </select>
            
            <!-- Location input -->
            <label for="location">Location:</label>
            <input type="text" id="location" name="location" required>
            
            <!-- Submit button -->
            <button type="submit">Submit</button>
        </form>
    </main>
    <!-- Footer with copyright -->
    <footer>
        <p>&copy; Your s3955172</p>
    </footer>
</body>
</html>
